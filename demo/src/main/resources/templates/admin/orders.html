<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pink Aura | Orders Admin</title>
    <style>
        body{ margin:0; font-family:'Segoe UI', sans-serif; background:#fff0f5; }
        .wrapper{ display:flex; min-height:100vh; }
        .sidebar{ width:250px; background:#9f2863; color:white; display:flex; flex-direction:column; justify-content:space-between; padding:20px; }
        .logo{ text-align:center; }
        .logo img{ width:70px; height:70px; border-radius:15px; border:2px solid #ff69b4; }
        .logo h2{ margin:10px 0; font-size:18px; }
        .nav a{ display:block; color:white; text-decoration:none; padding:12px; margin:6px 0; border-radius:10px; transition:0.3s; }
        .nav a:hover, .nav a.active{ background:#ff69b4; }
        .main{ flex:1; display:flex; flex-direction:column; }
        .content{ flex:1; padding:25px; }
        .title{ font-size:22px; color:#9f2863; font-weight:bold; margin-bottom:20px; }
        table{ width:100%; background:white; border-radius:15px; overflow:hidden; border-collapse:collapse; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
        th{ background:#9f2863; color:white; padding:12px; text-align:left; }
        td{ padding:12px; }
        tr:nth-child(even){ background:#fff0f5; }
        .status{ padding:5px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
        .pending{ background:#ff9800; color:white; }
        .completed{ background:#4caf50; color:white; }
        .cancelled{ background:#c2185b; color:white; }
        .btn{ padding:6px 10px; border:none; border-radius:8px; cursor:pointer; font-size:12px; background:#ff69b4; color:white; text-decoration:none; }
        .footer{ background:#9f2863; color:white; text-align:center; padding:12px; font-size:14px; margin-top:auto; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="sidebar">
        <div>
            <div class="logo">
                <img th:src="@{/images/logo.jpg}">
                <h2>Pink Aura Admin</h2>
            </div>
            <div class="nav">
                <a th:href="@{/admin/dashboard}">Dashboard</a>
                <a th:href="@{/admin/products}">Products</a>
                <a th:href="@{/admin/users}">Users</a>
                <a th:href="@{/admin/orders}" class="active">Orders</a>
                <a th:href="@{/admin/messages}">Messages</a>
            </div>
        </div>
        <div style="text-align:center; font-size:12px; opacity:0.7;">© 2026 Pink Aura</div>
    </div>
    <div class="main">
        <div class="content">
            <div class="title">Orders Management</div>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
           <tbody>
    <tr th:each="order : ${ordersList}"> 
        <td th:text="${order.id}">1</td>
        
        <td th:text="${order.f_name + ' ' + order.l_name}">User Name</td>
        
        <td th:text="${order.total_price + ' EGP'}">0 EGP</td>
        <td>
            <span th:classappend="${order.status}" class="status" th:text="${order.status}">pending</span>
        </td>
        <td>
          <a th:href="@{/admin/orders/cancel/{id}(id=${order.id})}" 
   class="btn btn-danger" 
   onclick="return confirm('Are you sure you want to cancel this order?')">
   Cancel
</a>
        </td>
    </tr>
</tbody>
            </table>
        </div>
        <div class="footer">Pink Aura Admin System | Orders Control Panel ✨</div>
    </div>
</div>
</body>
</html>
