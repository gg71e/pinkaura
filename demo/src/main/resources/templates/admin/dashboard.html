<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pink Aura | Dashboard</title>
    <style>
        /* الـ CSS بتاعك زي ما هو بالظبط */
        body{ margin:0; font-family:'Segoe UI', sans-serif; background:#fff0f5; display:flex; flex-direction:column; min-height:100vh; }
        .dashboard{ display:flex; flex:1; }
        .sidebar{ width:260px; background:#9f2863; color:white; padding:20px; display:flex; flex-direction:column; }
        .logo{ text-align:center; margin-bottom:30px; }
        .logo img{ width:70px; height:70px; border-radius:15px; border:2px solid #ff69b4; }
        .logo h2{ margin:10px 0; }
        .nav a{ display:block; color:white; text-decoration:none; padding:12px; margin:6px 0; border-radius:10px; transition:0.3s; }
        .nav a:hover, .nav a.active{ background:#ff69b4; }
        .main{ flex:1; padding:25px; }
        .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
        .welcome{ font-size:22px; color:#9f2863; font-weight:bold; }
        .logout-form { margin: 0; }
        .logout-btn{ background:#9f2863; color:white; border:none; padding:10px 18px; border-radius:20px; cursor:pointer; }
        .stats{ display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:25px; }
        .card{ background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.08); border-left:5px solid #ff69b4; }
        .card h3{ margin:0; color:#9f2863; }
        .card p{ font-size:24px; font-weight:bold; }
        footer{ background:#9f2863; color:white; text-align:center; padding:15px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="sidebar">
        <div class="logo">
            <img th:src="@{/images/logo.jpg}">
            <h2>Pink Aura</h2>
        </div>
        <div class="nav">
            <a th:href="@{/admin/dashboard}" class="active">Dashboard</a>
            <a th:href="@{/admin/products}">Products</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/orders}">Orders</a>
            <a th:href="@{/admin/messages}">Messages</a>
        </div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="welcome">Welcome, Admin ✨</div>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
        <div class="stats">
            <div class="card"><h3>Products</h3><p th:text="${productsCount}">0</p></div>
            <div class="card"><h3>Users</h3><p th:text="${usersCount}">0</p></div>
            <div class="card"><h3>Orders</h3><p th:text="${ordersCount}">0</p></div>
            <div class="card"><h3>Revenue</h3><p>[[${revenue}]] EGP</p></div>
        </div>
    </div>
</div>
<footer>© 2026 Pink Aura | Admin Dashboard</footer>
</body>
</html>
