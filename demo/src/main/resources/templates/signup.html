<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Aura | Sign Up</title>
    <style>
        /* الـ CSS بتاعك زي ما هو */
        body { background:#fff0f5; font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; overflow-x: hidden; }
        header { background:#9f2863; padding:15px 60px; color:white; display:flex; justify-content: space-between; align-items:center; }
        header h1 { margin:0; font-family: 'Playfair Display', serif; font-size:32px; }
        .logo-container { display: flex; align-items: center; }
        .logo-container img { width:60px; height:60px; margin-right:15px; border-radius:10px; }
        nav { display: flex; align-items: center; }
        nav a { color:white; text-decoration:none; margin-left:20px; font-weight:bold; padding:8px 18px; border-radius:20px; transition:0.3s; }
        nav a:hover, nav a.active { background:#ff69b4; }
        .cart-nav-item { display: inline-flex; align-items: center; background:#9f2863; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-left: 15px; font-weight: bold; }
        .page-title { text-align:center; margin-top:40px; }
        .page-title h2 { color:#9f2863; font-family: 'Playfair Display', serif; font-size:36px; }
        fieldset { border:2px solid #f8bbd0; border-radius:20px; width:65%; margin:30px auto; background:#ffffff; padding:20px; text-align: left; }
        legend { color:#9f2863; font-weight:bold; padding:0 12px; }
        label { color:#880e4f; font-weight: bold; }
        input { border-radius:20px; border:1px solid #f8bbd0; padding:10px 15px; margin-top:6px; width: 100%; box-sizing: border-box; outline: none; }
        .btn-container { text-align: center; margin-bottom: 50px; }
        input[type="submit"], input[type="reset"] { background:#ff69b4; color:white; border:none; padding:12px 30px; margin:15px 10px; border-radius:25px; font-size:15px; cursor:pointer; transition:0.3s; width: auto; }
        input[type="submit"]:hover { background:#9f2863; }
        
        /* Cart Sidebar Styles */
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .cart-sidebar.open { right: 0; }
        footer { background-color:#9f2863; color:white; text-align:center; padding:18px; position: fixed; bottom: 0; left: 0; width: 100%; }
    </style>
</head>
<body>

<header>
  <div class="logo-container">
      <img th:src="@{/images/logo.jpg}" alt="Pink Aura Logo">
      <h1>Pink Aura</h1>
  </div>
  <nav>
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/products}">Products</a>
    <a th:href="@{/about}">About Us</a>
    <a th:href="@{/signup}" class="active">Sign Up</a>
    <div class="cart-nav-item" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
  </nav>
</header>

<div class="page-title">
    <h2>Create Your Account</h2>
</div>
<form th:action="@{/register}" th:object="${user}" method="POST">
    <fieldset>
        <legend>Personal Information</legend>

        <p>
            <label>First Name:</label><br>
            <input type="text" th:field="*{first_name}" required>
        </p>

        <p>
            <label>Last Name:</label><br>
            <input type="text" th:field="*{last_name}" required>
        </p>

        <p>
            <label>Email:</label><br>
            <input type="email" th:field="*{email}" required>
        </p>

        <p>
            <label>Password:</label><br>
            <input type="password" th:field="*{password}" required>
        </p>
    </fieldset>

    <div class="btn-container">
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </div>
</form>



<div id="cart-sidebar" class="cart-sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
        <h3 style="margin: 0; color: #9f2863;">Your Cart</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:24px;">&times;</span>
    </div>
    <div id="cart-items-container"></div>
    <div style="border-top: 1px solid #eee; padding-top: 15px; margin-top: auto;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px;">
            <span>Total:</span>
            <span><span id="cart-total">0</span> EGP</span>
        </div>
        <a th:href="@{/checkout}" style="width: 100%; background: #9f2863; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; display: block;">Checkout</a>
    </div>
</div>

<footer>© 2026 Pink Aura | Elegance in Every Touch</footer>

<script>
    // كود الـ Cart يفضل شغال JS
    let cart = JSON.parse(localStorage.getItem('pinkAuraCart')) || [];
    window.onload = function() { updateCartUI(); };
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const totalElem = document.getElementById('cart-total');
        const countElem = document.getElementById('cart-count');
        if (!container) return;
        container.innerHTML = '';
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; border-bottom:1px solid #f9f9f9; padding-bottom:10px;">
                    <img src="${item.img}" style="width:50px; height:50px; object-fit:contain;">
                    <div style="flex:1;">
                        <div style="font-size:14px; font-weight:bold;">${item.name}</div>
                        <div style="color:#9f2863;">${item.price} EGP</div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#ccc; cursor:pointer;">&times;</button>
                </div>`;
        });
        if(totalElem) totalElem.innerText = total;
        if(countElem) countElem.innerText = cart.length;
    }
    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem('pinkAuraCart', JSON.stringify(cart));
        updateCartUI();
    }
</script>
</body>
</html>
