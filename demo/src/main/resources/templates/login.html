<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Aura | Login</title>
    <style>
        /* كل الـ CSS بتاعك (القديم + الجديد لرسالة الخطأ) */
        body { background:#fff0f5; font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; overflow-x: hidden; }
        header { background:#9f2863; padding:15px 60px; color:white; display:flex; justify-content: space-between; align-items:center; }
        header h1 { margin:0; font-family: 'Playfair Display', serif; font-size:32px; }
        .logo-container { display: flex; align-items: center; }
        .logo-container img { width:60px; height:60px; margin-right:15px; border-radius:10px; }
        nav { display: flex; align-items: center; }
        nav a { color:white; text-decoration:none; margin-left:20px; font-weight:bold; padding:8px 18px; border-radius:20px; transition:0.3s; }
        nav a:hover, nav a.active { background:#ff69b4; }

        .login-main { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; }
        .login-card { display: flex; width: 900px; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(159, 40, 99, 0.1); }
        .login-image { width: 50%; background: #fce4ec; display: flex; justify-content: center; align-items: center; padding: 40px; }
        .login-image img { max-width: 100%; border-radius: 15px; }

        .login-form-container { width: 50%; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-form-container h2 { color: #9f2863; font-size: 32px; margin-bottom: 10px; text-align: center; }
        .login-form-container p { color: #666; text-align: center; margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input { width: 100%; padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 15px; box-sizing: border-box; transition: 0.3s; }
        .input-group input:focus { border-color: #ff69b4; box-shadow: 0 0 8px rgba(255, 105, 180, 0.2); }

        .login-btn { background: #9f2863; color: white; border: none; padding: 14px; width: 100%; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .login-btn:hover { background: #ff69b4; transform: translateY(-2px); }

        .signup-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .signup-link a { color: #9f2863; font-weight: bold; text-decoration: none; }
        .error-msg { color: #d32f2f; background: #ffcdd2; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 14px; }

        .cart-nav-item { background:#9f2863; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-left: 15px; font-weight: bold; display: flex; align-items: center; }
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .cart-sidebar.open { right: 0; }
        #cart-items-container { flex: 1; overflow-y: auto; margin-top: 15px; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; }
        .checkout-btn { width: 100%; background: #9f2863; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; display: block; }
        
        footer { background: #9f2863; color: white; text-align: center; padding: 15px; width: 100%; position: relative; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img th:src="@{/images/logo.jpg}" alt="Logo">
        <h1>Pink Aura</h1>
    </div>
    <nav>
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/products}">Products</a>
        <a th:href="@{/about}">About Us</a>
        <a th:href="@{/login}" class="active">Login</a>
        <div class="cart-nav-item" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </nav>
</header>

<main class="login-main">
    <div class="login-card">
        <div class="login-image"><img th:src="@{/images/beauty.jpg}"></div>
        <div class="login-form-container">
            <h2>Welcome Back</h2>
            <p>Please enter your details to login</p>

            <div th:if="${param.error}" class="error-msg">
                Invalid email or password 🌸
            </div>

            <form th:action="@{/login}" method="post">
                <div class="input-group">
                    <input type="email" name="username" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="signup-link">Don't have an account? <a th:href="@{/signup}">Create Account</a></div>
        </div>
    </div>
</main>

<div id="cart-sidebar" class="cart-sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px;">
        <h3 style="margin: 0; color: #9f2863;">Your Cart</h3>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:24px;">&times;</span>
    </div>
    <div id="cart-items-container"></div>
    <div style="border-top: 1px solid #eee; padding-top: 15px; margin-top: auto;">
        <div class="total-row">
            <span>Total:</span>
            <span><span id="cart-total">0</span> EGP</span>
        </div>
        <a th:href="@{/checkout}" class="checkout-btn">Checkout</a>
    </div>
</div>

<footer>© 2026 Pink Aura | Elegance in Every Touch</footer>

<script>
    // كود الـ Cart اللي كان معاكي شغال بـ LocalStorage
    let cart = JSON.parse(localStorage.getItem('pinkAuraCart')) || [];

    window.onload = function () {
        updateCartUI();
    };

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const totalElem = document.getElementById('cart-total');
        const countElem = document.getElementById('cart-count');
        if (!container) return;

        container.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; border-bottom:1px solid #f9f9f9; padding-bottom:10px;">
                    <img src="${item.img}" style="width:50px; height:50px; object-fit:contain; border-radius:5px;">
                    <div style="flex:1;">
                        <div style="font-size:14px; font-weight:bold;">${item.name}</div>
                        <div style="color:#9f2863;">${item.price} EGP</div>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#ccc; cursor:pointer; font-size:18px;">&times;</button>
                </div>
            `;
        });
        totalElem.innerText = total;
        countElem.innerText = cart.length;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        localStorage.setItem("pinkAuraCart", JSON.stringify(cart));
        updateCartUI();
    }
</script>

</body>
</html>
