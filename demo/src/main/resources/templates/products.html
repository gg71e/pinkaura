<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pink Aura | Products</title>

    <style>
        body { background:#fff0f5; font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; overflow-x: hidden; }
        header { background:#9f2863; padding:15px 60px; color:white; display:flex; justify-content: space-between; align-items:center; flex-wrap: wrap; }
        header h1 { margin:0; font-family: 'Playfair Display', serif; font-size:32px; }
        .logo-container { display: flex; align-items: center; }
        .logo-container img { width:60px; height:60px; margin-right:15px; border-radius:10px; }
        nav a { color:white; text-decoration:none; margin-left:20px; font-weight:bold; padding:8px 18px; border-radius:20px; transition:0.3s; }
        nav a:hover, nav a.active { background:#ff69b4; }
        .section-title{ color:#9f2863; margin-top:50px; text-align:center; font-size:30px; font-family:'Playfair Display', serif; }

        .product-card a{ text-decoration: none; color: inherit; }
        .product-card{ text-decoration: none; color: inherit; }
        .product-card h3{ text-decoration: none; }
        .products{ display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }

        .product-card{
            background:#f8bbd0;
            width:220px;
            margin:15px;
            padding:15px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
            transition:0.3s ease;
            overflow:hidden;
            cursor:pointer;
        }
        .product-card:hover{ transform: translateY(-10px) scale(1.03); }

        .product-card img{ width:100%; height:180px; object-fit:cover; border-radius:15px; margin-bottom:15px; transition:0.4s; }
        .product-card:hover img{ transform:scale(1.1); }

        .product-card h3{ color:#880e4f; }

        .cart-nav-item { display: inline-flex; align-items: center; background: #9f2863; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-left: 15px; font-weight: bold; transition: 0.3s; gap: 8px; }
        .cart-nav-item:hover { background: #ff69b4; color: #9f2863; }
        
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100vh; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; text-align: left; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cart-header h3 { margin: 0; color: #9f2863; }
        .close-cart { cursor: pointer; font-size: 24px; color: #9f2863; }
        #cart-items-container { flex: 1; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
        .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .cart-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 5px; }
        .cart-footer { border-top: 1px solid #eee; padding-top: 15px; margin-top: auto; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; color: #333; }
        .checkout-btn { display: block; width: 100%; background: #9f2863; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; transition: 0.3s; box-sizing: border-box; }
        .checkout-btn:hover { background: #ff69b4; }

        footer { background: #9f2863; color: white; text-align: center; padding: 15px; width: 100%; margin-top: 40px; }
        .profile-icon img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ff69b4; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .profile-icon img:hover { transform: scale(1.1); }
        
        .logout-btn {
            cursor: pointer;
            font-size: 20px;
            color: white;
            transition: 0.3s;
        }
        .logout-btn:hover {
            transform: scale(1.1);
        }
        
        #logout-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .product-card { width: 180px; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>

<body>
<header>
    <div class="logo-container">
        <img th:src="@{/images/logo.jpg}" alt="Pink Aura Logo">
        <h1>Pink Aura</h1>
    </div>
    <nav style="display: flex; align-items: center; flex-wrap: wrap;">
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/products}" class="active">Products</a>
        <a th:href="@{/about}">About Us</a>
        <a th:href="@{/contact}">Contact Us</a>

        <div style="display: flex; align-items: center; gap: 15px; margin-left: 15px;">
            <div class="cart-nav-item" onclick="toggleCart()" id="cartIcon">
                🛒 <span id="cart-count">0</span>
            </div>
            <div class="logout-btn" onclick="showLogoutBanner()">⏻</div>
           
        </div>
    </nav>
</header>

<h2 class="section-title">Skin Care</h2>
<div class="products">
    <div class="product-card" onclick="location.href='/cleanser'">
        <img th:src="@{/images/cleanser.jpg}" alt="Cleanser">
        <h3>Facial Cleanser</h3>
    </div>
    <div class="product-card" onclick="location.href='/moisturizer'">
        <img th:src="@{/images/moisturizer.jpg}" alt="Moisturizer">
        <h3>Face Moisturizer</h3>
    </div>
    <div class="product-card" onclick="location.href='/sunscreen'">
        <img th:src="@{/images/sunscreen.jpg}" alt="Sunscreen">
        <h3>Sunscreen</h3>
    </div>
    <div class="product-card" onclick="location.href='/serum'">
        <img th:src="@{/images/serum.jpg}" alt="Serum">
        <h3>Serum</h3>
    </div>
</div>


<h2 class="section-title">Makeup</h2>
<div class="products">
    <div class="product-card" onclick="location.href='/blush'">
        <img src="/images/blush.jpg" alt="Blush">
        <h3>Blush</h3>
    </div>
    <div class="product-card" onclick="location.href='/lipstick'">
        <img src="/images/lipstick.jpg" alt="Lipstick">
        <h3>Lipstick</h3>
    </div>
    <div class="product-card" onclick="location.href='/mascara'">
        <img src="/images/mascara.jpg" alt="Mascara">
        <h3>Mascara</h3>
    </div>
    <div class="product-card" onclick="location.href='/foundation'">
        <img src="/images/foundation.jpg" alt="Foundation">
        <h3>Foundation</h3>
    </div>
   
</div>

<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
        <h3>Your Cart</h3>
        <span class="close-cart" onclick="toggleCart()">&times;</span>
    </div>
    <div id="cart-items-container"></div> 
    <div class="cart-footer">
        <div class="total-row">
            <span>Total:</span>
            <span><span id="cart-total">0</span> EGP</span>
        </div>
        <a th:href="@{/checkout}" class="checkout-btn">Checkout</a>
    </div>
</div>

<div id="logout-modal">
    <div style="background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px;">
        <h3 style="color: #9f2863;">Logout</h3>
        <p>Are you sure you want to logout?</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button onclick="confirmLogout()" style="background: #9f2863; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">Logout</button>
            <button onclick="closeLogoutBanner()" style="background: #eee; color: #333; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<footer>© 2026 Pink Aura | Elegance in Every Touch</footer>

<script>
    let cart = JSON.parse(localStorage.getItem('pinkAuraCart')) || [];

   
    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function updateCartUI() {
        const container = document.getElementById('cart-items-container');
        const totalElem = document.getElementById('cart-total');
        const countElem = document.getElementById('cart-count');
        
        if (!container) return; 

        container.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">Your cart is empty</div>';
        } else {
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image || item.img}" style="width:50px; height:50px; object-fit:contain; border-radius:5px;">
                        <div style="flex:1;">
                            <div style="font-size:14px; font-weight:bold; color:#333;">${item.name}</div>
                            <div style="color:#9f2863; font-weight:bold;">${item.price} EGP</div>
                        </div>
                        <button onclick="removeFromCart(${index})" style="color:#999; background:none; border:none; cursor:pointer; font-size:20px;">&times;</button>
                    </div>
                `;
            });
        }

        if (totalElem) totalElem.innerText = total;
        if (countElem) countElem.innerText = cart.length;
        localStorage.setItem('pinkAuraCart', JSON.stringify(cart));
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
    }
    
    function showLogoutBanner() {
        document.getElementById('logout-modal').style.display = 'flex';
    }

    function closeLogoutBanner() {
        document.getElementById('logout-modal').style.display = 'none';
    }

    function confirmLogout() {
        localStorage.removeItem("loggedIn");
        localStorage.removeItem("pinkAuraCart");
        window.location.href = '/login';
    }
</script>
</body>
</html>
